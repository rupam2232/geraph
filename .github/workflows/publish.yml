name: Geraph CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  validate-and-publish:
    name: Validate and Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Run Linting
        run: npm run lint

      - name: Check type declarations
        run: npm run check-types

      - name: Build Packages
        run: npm run build

      - name: Dry Run NPM Pack
        run: |
          cd packages/cli
          npm pack --dry-run

      - name: Publish to NPM (Keyless OIDC)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd packages/cli
          npm publish --provenance
